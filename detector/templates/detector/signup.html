{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Account — SENTINEL-X</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'detector/custom.css' %}">
</head>
<body>
  <main class="min-vh-100 d-flex align-items-center justify-content-center px-3" style="background: var(--surface);">
    <section class="glass-panel p-4 p-md-5" style="width: min(540px, 100%);">
      <div class="text-center mb-4">
        <span class="material-symbols-outlined text-primary mb-2" style="font-size: 48px;">person_add</span>
        <h1 class="mono fw-bold mb-1" style="font-size: 22px; color: var(--on-surface);">CREATE ACCOUNT</h1>
        <p class="mb-0" style="color: var(--on-surface-variant); font-size: 13px;">Create a site account to save your scan history.</p>
      </div>
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger py-2 mono" style="font-size: 12px;">{{ message }}</div>
        {% endfor %}
      {% endif %}
      <form method="post" class="d-grid gap-3">
        {% csrf_token %}
        <div class="row g-2">
          <div class="col-md-6">
            <label class="mono" style="font-size: 11px; color: var(--on-surface-variant);">USERNAME</label>
            <input name="username" type="text" class="form-control py-3 mono" required autofocus
                   style="background: var(--surface-container-lowest); border-color: var(--outline-variant); color: var(--on-surface);">
          </div>
          <div class="col-md-6">
            <label class="mono" style="font-size: 11px; color: var(--on-surface-variant);">EMAIL</label>
            <input name="email" type="email" class="form-control py-3 mono" required
                   style="background: var(--surface-container-lowest); border-color: var(--outline-variant); color: var(--on-surface);">
          </div>
        </div>
        <label class="mono" style="font-size: 11px; color: var(--on-surface-variant);">PASSWORD</label>
        <input name="password" type="password" class="form-control py-3 mono" required
               style="background: var(--surface-container-lowest); border-color: var(--outline-variant); color: var(--on-surface);">
        <label class="mono" style="font-size: 11px; color: var(--on-surface-variant);">CONFIRM PASSWORD</label>
        <input name="password2" type="password" class="form-control py-3 mono" required
               style="background: var(--surface-container-lowest); border-color: var(--outline-variant); color: var(--on-surface);">
        <div class="d-flex gap-2">
          <button class="btn btn-primary py-3 fw-bold mono mt-2" style="background: var(--primary); color: #050a15; border: 0;">CREATE ACCOUNT</button>
          <a href="{% url 'user_login' %}" class="btn btn-outline-secondary py-3 mono mt-2">Sign in</a>
        </div>
      </form>
      <div class="text-center mt-4">
        <a href="{% url 'dashboard' %}" class="text-secondary mono text-decoration-none" style="font-size: 11px;">RETURN TO SCANNER</a>
      </div>
    </section>
  </main>
</body>
</html>
