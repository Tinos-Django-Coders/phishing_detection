{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} | SENTINEL-X</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'detector/custom.css' %}">
</head>
<body class="bg-dark text-light">
  <nav class="navbar navbar-expand-lg border-bottom sticky-top"
       style="background-color: var(--surface-container-low); border-color: var(--outline-variant) !important; height: 64px; z-index: 1050;">
    <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center gap-3">
        <a href="{% url 'dashboard' %}" class="text-decoration-none">
          <span class="mono fw-bold fs-4 text-primary tracking-tighter"
                style="text-shadow: 0 0 12px rgba(0,240,255,0.45);">SENTINEL-X</span>
        </a>
        <span class="badge badge-safe rounded-pill font-monospace d-none d-sm-inline"
              style="font-size: 10px;">ANALYST NODE v2.0</span>
      </div>
      <div class="d-none d-md-flex align-items-center gap-4">
        <div class="mono text-secondary" style="font-size: 11px;">
          LATENCY: <span class="text-success fw-bold">OPTIMAL</span>
        </div>
        <div class="mono text-secondary" style="font-size: 11px;">
          UPTIME: <span class="text-primary fw-bold">99.98%</span>
        </div>
      </div>
      <div class="d-flex align-items-center gap-3">
        <a href="{% url 'dashboard' %}" class="btn btn-sm mono"
           style="border: 1px solid var(--outline-variant); color: var(--on-surface);">SCANNER</a>
        <a href="{% url 'admin_dashboard' %}" class="btn btn-sm mono"
           style="border: 1px solid var(--primary); color: var(--primary);">ADMIN</a>
      </div>
    </div>
  </nav>

  <main class="min-vh-100 py-5 px-3" style="background: var(--surface);">
    <section class="container" style="max-width: 880px;">
      <div class="glass-panel mt-4 p-4 p-md-5">
        <span class="material-symbols-outlined text-primary mb-3" style="font-size: 42px;">policy</span>
        <h1 class="fw-bold mb-3" style="color: var(--on-surface);">{{ title }}</h1>
        <p class="lead" style="color: var(--on-surface-variant);">{{ intro }}</p>
        <div class="d-grid gap-3 mt-4">
          {% for heading, body in sections %}
            <article class="p-3 rounded" style="background: var(--surface-container-low); border: 1px solid var(--outline-variant);">
              <h2 class="mono mb-2" style="font-size: 13px; color: var(--primary);">{{ heading }}</h2>
              <p class="mb-0" style="color: var(--on-surface-variant);">{{ body }}</p>
            </article>
          {% endfor %}
        </div>
      </div>
    </section>
  </main>
</body>
</html>
